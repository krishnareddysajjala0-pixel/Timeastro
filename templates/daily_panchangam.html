<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>దిన పంచాంగం (Daily Panchangam)</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1A1A1D">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: radial-gradient(circle at 20% 30%, rgba(120, 119, 198, 0.3) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 119, 198, 0.2) 0%, transparent 50%), linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --text-main: #f8fafc;
            --text-muted: #a0a0ff;
            --card-bg: rgba(25, 25, 35, 0.9);
            --card-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(15, 12, 41, 0.6);
            --input-border: rgba(102, 126, 234, 0.3);
            --btn-show-bg: linear-gradient(135deg, #facc15, #eab308);
            --header-bg: linear-gradient(45deg, #ffffff, #a0a0ff);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 {
            font-size: 28px;
            background: var(--header-bg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #d0d0ff; }
        .input-container { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #a0a0ff; }
        input {
            width: 100%; padding: 14px 14px 14px 44px;
            border-radius: 12px; border: 2px solid var(--input-border);
            background: var(--input-bg); color: var(--text-main); font-size: 16px;
        }
        .btn-container { margin-top: 20px; display: flex; justify-content: center; }
        .btn {
            padding: 14px 24px; border-radius: 12px; border: none; font-size: 16px;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px;
            background: var(--btn-show-bg); color: #111;
        }
        .panchangam-result {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }
        .result-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .result-icon { font-size: 24px; color: #ffd700; width: 30px; text-align: center; }
        .result-label { font-size: 14px; color: var(--text-muted); }
        .result-value { font-size: 18px; font-weight: 600; color: #fff; }
        
        /* Bottom Navbar */
        .fixed-bottom-bar-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around;
            padding: 12px 0; z-index: 10000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #a0a0ff; text-decoration: none; font-size: 12px; gap: 5px;
            transition: all 0.3s ease;
        }
        .nav-item.active { color: #ffd700; }
        .nav-item i { font-size: 20px; }
        .nav-item:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h2><i class="fas fa-calendar-alt"></i> దిన పంచాంగం</h2>
            </div>
            
            <form action="/daily_panchangam" method="POST">
                <div class="form-grid">
                    <div>
                        <label><i class="fas fa-calendar"></i> తేది (Date)</label>
                        <div class="input-container">
                            <i class="fas fa-calendar-day input-icon"></i>
                            <input type="date" name="dob" value="{{ dob }}" required>
                        </div>
                    </div>
                    <div>
                        <label><i class="fas fa-clock"></i> సమయం (Time)</label>
                        <div class="input-container">
                            <i class="fas fa-clock input-icon"></i>
                            <input type="time" name="tob" value="{{ tob }}" required>
                        </div>
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <label><i class="fas fa-map-marker-alt"></i> స్థలం (Place)</label>
                        <div class="input-container">
                            <i class="fas fa-map-marker-alt input-icon"></i>
                            <input type="text" name="place" value="{{ place }}" placeholder="గ్రామం, నగరం, రాష్ట్రం">
                        </div>
                        <input type="hidden" name="lat" value="{{ lat }}">
                        <input type="hidden" name="lon" value="{{ lon }}">
                    </div>
                </div>
                <div class="btn-container">
                    <button type="submit" class="btn"><i class="fas fa-sync"></i> పంచాంగం చూడండి</button>
                </div>
            </form>

            <div class="panchangam-result">
                <div class="result-item">
                    <div class="result-icon"><i class="fas fa-moon"></i></div>
                    <div>
                        <div class="result-label">తిథి (Tithi)</div>
                        <div class="result-value">{{ tithi_num }}, {{ tithi_desc }}</div>
                        <div style="font-size: 12px; color: #a0a0ff;">({{ tithi_full }})</div>
                    </div>
                </div>
                <div class="result-item">
                    <div class="result-icon"><i class="fas fa-star"></i></div>
                    <div>
                        <div class="result-label">నక్షత్రం (Nakshatra)</div>
                        <div class="result-value">{{ nakshatra }}</div>
                    </div>
                </div>
                <div class="result-item">
                    <div class="result-icon"><i class="fas fa-sun" style="color: #ff9800;"></i></div>
                    <div>
                        <div class="result-label">సూర్యోదయం (Sunrise)</div>
                        <div class="result-value">{{ sunrise }}</div>
                    </div>
                </div>
                <div class="result-item">
                    <div class="result-icon"><i class="fas fa-cloud-sun" style="color: #ff5722;"></i></div>
                    <div>
                        <div class="result-label">సూర్యాస్తమయం (Sunset)</div>
                        <div class="result-value">{{ sunset }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Bar -->
    <div class="fixed-bottom-bar-nav">
        <a href="/" class="nav-item">
            <i class="fas fa-home"></i>
            <span>హోమ్</span>
        </a>
        <a href="/daily_panchangam" class="nav-item active">
            <i class="fas fa-om"></i>
            <span>పంచాంగం</span>
        </a>
        <a href="/calendar_view" class="nav-item">
            <i class="fas fa-calendar-alt"></i>
            <span>క్యాలెండర్</span>
        </a>
    </div>
</body>
</html>
